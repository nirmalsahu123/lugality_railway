spring:
  application:
    name: lugality-scraper
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 30MB

server:
  port: ${PORT:8080}

scraper:
  # ── Primary email (Worker 0) ──────────────────────────────────────────────
  email-address: ${EMAIL_ADDRESS}
  email-app-password: ${EMAIL_APP_PASSWORD}
  imap-server: ${IMAP_SERVER:imap.hostinger.com}

  # ── Worker emails 1-3 ─────────────────────────────────────────────────────
  email-address-1: ${EMAIL_ADDRESS_1:}
  email-app-password-1: ${EMAIL_APP_PASSWORD_1:}
  email-address-2: ${EMAIL_ADDRESS_2:}
  email-app-password-2: ${EMAIL_APP_PASSWORD_2:}
  email-address-3: ${EMAIL_ADDRESS_3:}
  email-app-password-3: ${EMAIL_APP_PASSWORD_3:}

  # ── Target ────────────────────────────────────────────────────────────────
  target-url: ${TARGET_URL:https://tmrsearch.ipindia.gov.in/estatus}

  # ── Rate limiting ─────────────────────────────────────────────────────────
  rate-limit-per-minute: ${RATE_LIMIT_PER_MINUTE:8}
  delay-between-searches: ${DELAY_BETWEEN_SEARCHES:30}

  # ── Session management ────────────────────────────────────────────────────
  session-refresh-minutes: ${SESSION_REFRESH_MINUTES:50}
  otp-timeout-seconds: ${OTP_TIMEOUT_SECONDS:360}

  # ── Reliability ───────────────────────────────────────────────────────────
  max-retries: ${MAX_RETRIES:3}
  browser-timeout: ${BROWSER_TIMEOUT:35000}

  # ── Parallel settings ─────────────────────────────────────────────────────
  num-workers: ${NUM_WORKERS:4}
  checkpoint-interval: ${CHECKPOINT_INTERVAL:25}
  browser-recycle-interval: ${BROWSER_RECYCLE_INTERVAL:999}
  max-concurrent-downloads: ${MAX_CONCURRENT_DOWNLOADS:4}
  app-timeout-seconds: ${APP_TIMEOUT_SECONDS:240}

  # ── Storage ───────────────────────────────────────────────────────────────
  # Set to "google_drive" to enable Google Drive upload
  storage-mode: ${STORAGE_MODE:local}
  local-data-dir: ${LOCAL_DATA_DIR:./output/data}
  local-pdf-dir: ${LOCAL_PDF_DIR:./output/pdfs}

  # ── Google Drive (required when storage-mode=google_drive) ────────────────
  google-drive-folder-id: ${GOOGLE_DRIVE_FOLDER_ID:}
  google-service-account-json: ${GOOGLE_SERVICE_ACCOUNT_JSON:}

  # ── Supabase (optional) ───────────────────────────────────────────────────
  supabase-url: ${SUPABASE_URL:}
  supabase-key: ${SUPABASE_KEY:}

  # ── AWS S3 (optional) ─────────────────────────────────────────────────────
  aws-access-key-id: ${AWS_ACCESS_KEY_ID:}
  aws-secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  s3-bucket-name: ${S3_BUCKET_NAME:}
  s3-region: ${S3_REGION:ap-south-1}

  # ── Browser ───────────────────────────────────────────────────────────────
  headless: ${HEADLESS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.lugality: INFO
    org.springframework: WARN
    org.apache.pdfbox: ERROR
    org.apache.fontbox: ERROR